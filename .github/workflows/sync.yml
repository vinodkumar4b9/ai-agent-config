name: Sync agents.md to all repos
on:
  push:
    paths: ['agents.md']
jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [eks-gitops-argocd, backstage-vinod]
        branch: [main, dev]
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v5
        with:
          path: source

      - name: Checkout destination repo
        uses: actions/checkout@v5
        with:
          repository: vinodkumar4b9/${{ matrix.repo }}
          ref: ${{ matrix.branch }}
          token: ${{ secrets.API_TOKEN_GITHUB }}
          path: destination

      - name: Copy agents.md
        run: cp source/agents.md destination/agents.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          path: destination
          token: ${{ secrets.API_TOKEN_GITHUB }}
          commit-message: 'Sync agents.md from ai-agent-config'
          title: 'Sync agents.md from ai-agent-config'
          body: |
            Automated sync of `agents.md` from
            https://github.com/vinodkumar4b9/ai-agent-config/commit/${{ github.sha }}
          branch: sync/agents-md-${{ matrix.branch }}
          base: ${{ matrix.branch }}
          delete-branch: true
