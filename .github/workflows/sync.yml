name: Sync agents.md to all repos
on:
  push:
    paths: ['agents.md']
jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [eks-gitops-argocd,backstage-vinod]  # your 20 repos
        branch: [test, stage]
    steps:
      - uses: actions/checkout@v5
      - uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          source_file: 'agents.md'
          destination_repo: 'vinodkumar4b9/${{ matrix.repo }}'
          destination_branch: '${{ matrix.branch }}'
          destination_folder: '.'
          user_email: 'vinodkumar4b9@gmail.com'
          user_name: 'vinodkumar4b9'
